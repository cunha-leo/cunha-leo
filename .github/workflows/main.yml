name: Generate Datas

on:
  schedule:
    - cron: "* */6 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Espera/retenta a API do GitHub antes de rodar a action
      - name: Wait for GitHub API to be available
        run: |
          for i in {1..6}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api.github.com/zen || echo 000)
            if [ "$status" = "200" ]; then
              echo "GitHub API OK"
              exit 0
            fi
            echo "GitHub API not ready (status $status). Retrying in 10s..."
            sleep 10
          done
          echo "GitHub API unreachable after retries" >&2
          exit 1

      # 2) Pin a action para uma versão em vez de @master
      - uses: Platane/snk@v1
        id: snake-gif
        with:
          github_user_name: cunha-leo
          svg_out_path: dist/github-contribution-grid-snake.svg
        # Opcional: caso queira não falhar toda a job se essa action falhar,
        # descomente a linha abaixo:
        # continue-on-error: true

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
