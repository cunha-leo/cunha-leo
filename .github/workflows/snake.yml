name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate and Publish Profile Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cunha-leo
          filename: dist/github-profile-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          config_order: base.header, base.activity+community, base.repositories, isocalendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cunha-leo
          filename: dist/github-languages-metrics.svg
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_other: yes

      - name: Generate activity metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: cunha-leo
          filename: dist/github-activity-metrics.svg
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 90
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: cunha-leo
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish generated assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
